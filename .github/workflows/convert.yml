name: 単語帳を自動変換

on:
  push:
    paths:
      - '**/*.xlsx'
      - '**/*.xls'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 依存パッケージインストール
        run: pip install openpyxl -q

      - name: words.json を生成
        run: python3 変換.py --silent

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add words.json
          git diff --cached --quiet || git commit -m "auto: words.json を更新"
          git push
